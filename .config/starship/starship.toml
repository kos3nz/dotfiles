# Inserts a blank line between shell prompts

add_newline = true

# Performance tuning
# scan_timeout: max ms to scan files before giving up (default: 30ms)
# command_timeout: max ms a module command can run (default: 500ms)
scan_timeout = 30
command_timeout = 500

format = """
$directory\
$git_branch\
$git_status\
$package\
$deno\
$golang\
$nodejs\
$lua\
$php\
$ruby\
$rust\
$swift\
$docker_context\
$kubernetes\
$aws\
$cmd_duration
$character
"""

[username]
style_user = "green"
style_root = "red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](yellow) '
trim_at = "."
disabled = false

[character] # έζψ > ΎΣι ΎΒΦ Ός╢ ≤▒ησ
success_symbol = " [έζψ](bold green)"
error_symbol = " [ΎΑΞ](bold red)"

[directory] # ΌεΣ  ΎΝΓ  ≤░Λι  ≤▒βζ
format = ' [≤░Λι ](white) [$path]($style)[$read_only]($read_only_style) '
read_only = " ≤░ΞΒ"
read_only_style = "green"
truncation_length = 10
truncate_to_repo = true
style = "blue bold"

[cmd_duration] # ΎΚΤ  ≤░ΕΚ  ≤░Φδ
format = '[|](black) [≤░ΕΚ ](yellow) [$duration]($style)'
min_time = 4
show_milliseconds = false
disabled = false
style = "yellow"

[git_branch]
format = '[|](black) [$symbol$branch]($style) '
symbol = "ΎΡα "
style = "cyan"

[git_status]
format = """
([|](black)$ahead_behind )\
(\
[|](black)\
$conflicted\
$staged\
$renamed\
$modified\
$untracked\
$deleted\
$stashed\
)\
"""
conflicted = " [Όεπ ](red)"
ahead = " [έΘκ┬╖${count}](green)"
behind = " [έΘμ┬╖${count}](red)"
diverged = " [έΘκ┬╖${ahead_count}](green) [έΘμ┬╖${behind_count}](red)"
untracked = " [?┬╖${count}](purple) " # ?, ΎΕρ
stashed = " [≤░ΠΩ ┬╖${count}](blue) " # $, ΎΗΤ , ≤░ΠΩ
modified = " [Ότη ┬╖${count}](yellow) " # !, ΎΖΜ, Ότη
staged = " [Ότε ┬╖${count}](green) " # +,έεΥ, ΎΔ╛, Ότε, Ότε
renamed = " [Ότι ┬╖${count}](purple) " # ┬╗, Ότι
deleted = " [Ότθ ┬╖${count}](red) " # -, ΎΖΗ, Ότθ
# Skips scanning submodules έΑΦ speeds up git_status significantly in large repos
ignore_submodules = true

[aws]
symbol = "ΌΝ╜"
format = '[|](black) [$symbol ($profile )(\($region\) )(\[$duration\] )]($style)'

[deno]
symbol = "ΏθοΧ"
format = '[|](black) [ΏθοΧ $version]($style) '
detect_files = ['deno.json', 'deno.jsonc']
style = 'green'

# [directory]
# read_only = " Ύι╜"

[docker_context]
symbol = "ΎΝΙ"
format = "[|](black) [$symbol  $context]($style) "
style = "blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[fill]
symbol = ' '

[golang]
symbol = "Όαπ"
format = "[|](black) [$symbol $version]($style) "

[kubernetes]
symbol = "έα╕"
format = '[$symbol $context( \($namespace\))]($style) in '
style = "cyan"
disabled = true

[lua]
format = "[|](black) [$symbol $version]($style) "
symbol = 'Όαι'                                      # ΎΗΗ Όαι
detect_folders = ['lua']
style = 'blue'

[nodejs]
symbol = "≤░Οβ"
format = "[|](black) [$symbol $version]($style) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
style = "green"

[package]
symbol = "ΎΤΘ"
format = "[|](black) [$symbol $version]($style) "
style = "208"
disabled = true

[php]
symbol = "ΌαΙ"
format = "[|](black) [$symbol $version]($style) "
disabled = true

[python]
symbol = "ΌαΗ"
format = '[|](black) [${symbol}python (${version} )(\($virtualenv\) )]($style) '
#pyenv_version_name = true
style = "yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"
disabled = true

[ruby]
symbol = "ΌηΣ"                                      # ΌηΣ ΌΙ╛
format = "[|](black) [$symbol $version]($style) "
disabled = true

[rust]
symbol = "ΌγΜ"
format = "[|](black) [$symbol $version]($style) "

[shlvl]
format = '[|](black) [$symbol$shlvl]($style) '
repeat = true
symbol = 'έζψ'
repeat_offset = 1
threshold = 0
disabled = true

[swift]
symbol = "Όγβ "   # ΌζΧ Όγβ ≤░δξ
disabled = true

[time]
format = '[ΌβΒ $time]($style)' # ΌβΒ ΌΟΜ ΌΟΔ ΌΟΕ ΌΟΖ ΌΟΗ ΌΟΚ
use_12hr = false
time_format = '%T'           # %T = 12-hour format, %r = 24-hour format
utc_time_offset = 'local'
# style = 'magenta'
# time_range = '10:00:00-18:00:00'
disabled = true
